name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: openai/fence@db291f5c51949e6e6ec1634621b36dc4bbf3d54a # pin@v0.8.7

      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # pin@v6

      # read the hugo version from the .hugo-version file in this repository
      - name: set hugo version
        id: hugo-version
        run: |
          HUGO_VERSION=$(cat .hugo-version)
          echo "HUGO_VERSION=${HUGO_VERSION}" >> $GITHUB_OUTPUT
          echo "Using Hugo version ${HUGO_VERSION}"

      - name: verify vendored hugo cli
        working-directory: bin/vendor
        run: sha256sum --check --strict SHA256SUMS

      # extract the verified hugo cli using the version detected in the previous step
      - name: extract vendored hugo cli
        env:
          HUGO_VERSION: ${{ steps.hugo-version.outputs.HUGO_VERSION }}
        run: |
          hugo_root="${RUNNER_TEMP}/hugo-${HUGO_VERSION}"
          mkdir -p "${hugo_root}"
          dpkg-deb --extract "bin/vendor/hugo_extended_${HUGO_VERSION}_linux-amd64.deb" "${hugo_root}"
          echo "${hugo_root}/usr/local/bin" >> "${GITHUB_PATH}"

      # build the site with hugo
      - name: build with hugo
        env:
          GOTOOLCHAIN: local
          GOPROXY: "off"
          HUGO_MODULE_PROXY: "off"
          HUGO_SECURITY_HTTP_URLS: "none"
        run: hugo --gc --minify --logLevel info
